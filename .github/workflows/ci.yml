name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  swiftpm-tests:
    name: SidepotCore unit tests (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          xcodebuild -version
          swift --version

      - name: Run SidepotCore test suite
        working-directory: SidepotCore
        run: swift test

  xcodebuild:
    name: Build & test the Sidepot app (xcodebuild)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep -i iphone

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; data=json.load(sys.stdin); names=[d['name'] for runtime in data['devices'].values() for d in runtime if 'iPhone' in d['name']]; print(names[-1] if names else '')")
          echo "Chosen simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build (Sidepot scheme, iOS Simulator)
        run: |
          xcodebuild build \
            -project Sidepot.xcodeproj \
            -scheme Sidepot \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -derivedDataPath build \
            -skipMacroValidation

      - name: Boot simulator, install, launch, and screenshot
        run: |
          set -x
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; data=json.load(sys.stdin); ids=[d['udid'] for runtime in data['devices'].values() for d in runtime if d['name']=='${{ steps.sim.outputs.name }}']; print(ids[-1])")
          APP_PATH=$(find build/Build/Products -maxdepth 1 -name "*.app" -type d | head -1)
          echo "App: $APP_PATH, simulator: $UDID"

          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" com.example.sidepot

          # Give SwiftUI a moment to render the first frame before capturing it.
          sleep 4
          mkdir -p screenshots
          xcrun simctl io "$UDID" screenshot screenshots/01-first-launch.png

      - uses: actions/upload-artifact@v4
        with:
          name: Sidepot-simulator-screenshots
          path: screenshots/
          retention-days: 14

      - name: Test (SidepotTests + SidepotUITests)
        run: |
          xcodebuild test \
            -project Sidepot.xcodeproj \
            -scheme Sidepot \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -skipMacroValidation

  unsigned-ipa:
    name: Build an unsigned .ipa for sideloading (AltStore/AltServer)
    needs: xcodebuild
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Real-device archive with code signing disabled. This produces an unsigned .app -- it's
      # not installable as-is. AltServer (running on the sideloader's own computer) re-signs it
      # from scratch using their free Apple ID when they add it to AltStore, so no Apple
      # Developer account or certificate is needed on the CI side at all.
      - name: Archive (real device, unsigned)
        run: |
          xcodebuild archive \
            -project Sidepot.xcodeproj \
            -scheme Sidepot \
            -archivePath build/Sidepot.xcarchive \
            -destination 'generic/platform=iOS' \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package .ipa
        run: |
          mkdir -p ipa/Payload
          cp -r build/Sidepot.xcarchive/Products/Applications/Sidepot.app ipa/Payload/
          cd ipa && zip -r ../Sidepot-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Sidepot-unsigned-ipa
          path: Sidepot-unsigned.ipa
          retention-days: 14
