name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  swiftpm-tests:
    name: SidepotCore unit tests (swift test)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          xcodebuild -version
          swift --version

      - name: Run SidepotCore test suite
        working-directory: SidepotCore
        run: swift test

  xcodebuild:
    name: Build & test the Sidepot app (xcodebuild)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Environment info
        run: |
          xcodebuild -version
          xcrun simctl list devicetypes | grep -i iphone

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; data=json.load(sys.stdin); names=[d['name'] for runtime in data['devices'].values() for d in runtime if 'iPhone' in d['name']]; print(names[-1] if names else '')")
          echo "Chosen simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build (Sidepot scheme, iOS Simulator)
        run: |
          xcodebuild build \
            -project Sidepot.xcodeproj \
            -scheme Sidepot \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -skipMacroValidation

      - name: Test (SidepotTests + SidepotUITests)
        run: |
          xcodebuild test \
            -project Sidepot.xcodeproj \
            -scheme Sidepot \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -skipMacroValidation
